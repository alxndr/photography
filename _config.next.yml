# Alternate Theme Config (https://theme-next.js.org/docs/getting-started/configuration)
# Hexo merges this over themes/next/_config.yml at build time, so overrides
# survive theme updates and never require touching the theme submodule itself.

font:
  enable: true
  global:
    family: Palatino

custom_file_path:
  style: source/_css/custom.css

motion:
  enable: false

menu:
  about: /about/ || fa fa-user
  tags: /tags/ || fa fa-tags

# One 500px source image for every slot - browsers downscale as needed.
# safari_pinned_tab is intentionally left unset (falls back to the theme's
# default logo.svg) - it needs a single-color SVG mask icon, not a PNG.
favicon:
  small: /images/favicon-camera-500px.png
  medium: /images/favicon-camera-500px.png
  apple_touch_icon: /images/favicon-camera-500px.png
